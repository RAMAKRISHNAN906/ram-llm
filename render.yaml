services:
  - type: web
    name: ram-llm-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: HF_TOKEN
        sync: false
      - key: HF_MODEL
        value: deepseek-ai/DeepSeek-R1:fastest
      - key: HF_API_URL
        value: https://router.huggingface.co/v1/chat/completions
      - key: CORS_ORIGIN
        value: https://ram-llm.web.app
      - key: MAX_RETRIES
        value: "2"
      - key: RETRY_DELAY_MS
        value: "1500"
