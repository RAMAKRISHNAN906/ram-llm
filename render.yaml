services:
  - type: web
    name: ram-llm-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: HF_TOKEN
        sync: false
      - key: HF_MODEL
        value: Qwen/Qwen2.5-7B-Instruct
      - key: HF_FALLBACK_MODEL
        value: meta-llama/Llama-3.1-8B-Instruct
      - key: FIRST_TOKEN_TIMEOUT_MS
        value: "3000"
      - key: HF_API_URL
        value: https://router.huggingface.co/v1/chat/completions
      - key: CORS_ORIGIN
        value: https://ram-llm.web.app
      - key: MAX_RETRIES
        value: "1"
      - key: RETRY_DELAY_MS
        value: "800"
      - key: HF_TEMPERATURE
        value: "0.2"
      - key: HF_MAX_TOKENS
        value: "180"
